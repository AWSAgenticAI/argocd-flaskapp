on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: [self-hosted]
    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
       ls
       # create docker image of python app
       sudo docker build -t flaskapp .
       sudo docker images
       # save image in k3s controller to access argocd deployment
       sudo docker save flaskapp:latest | sudo k3s ctr images import -

  deploy:
    # This enforces that job1 (build) must complete successfully first
    needs: build
    runs-on: [self-hosted]
    steps:
    - uses: actions/checkout@v4
    - name: Deploy Kubernetes Manifest
      run: |
        # Apply the deployment file to your cluster
        sudo kubectl apply -f argocd-flaskapp.yaml
