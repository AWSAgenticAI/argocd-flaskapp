on:
  push:
    branches: [ "main" ]

# Grant permission to the pipeline to write back to your Git repository
permissions:
  contents: write

jobs:
  build:
    runs-on: [self-hosted]
    steps:
    - uses: actions/checkout@v4
    
    - name: Build and Import Docker image
      run: |
       # Tag and import the image with the unique GitHub commit SHA
       sudo docker build -t flaskapp:${{ github.sha }} .
       sudo docker save flaskapp:${{ github.sha }} | sudo k3s ctr images import -

  deploy:
    needs: build
    runs-on: [self-hosted]
    steps:
    - uses: actions/checkout@v4
      with:
        # Fetch full history so we can push back safely
        fetch-depth: 0 
    
    - name: Update Deployment Image Tag in Git
      env:
        # Pass the built-in token to the step environment
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Change the image tag inside your deployment sub-directory
        sed -i 's|image: flaskapp:.*|image: flaskapp:${{ github.sha }}|g' app-deployment/flaskapp.yaml
        
        # Configure local git user profile
        git config --global user.name  "github-action[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Commit the file change
        git add app-deployment/flaskapp.yaml
        git commit -m "chore: update flaskapp image tag to ${{ github.sha }} [skip ci]"
        
        # Authenticate origin with the token and push safely
        git remote set-url origin https://x-token-auth:${GITHUB_TOKEN}@://github.com{{ github.repository }}.git
        git push origin main
