apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AWSAgenticAI/argocd-flaskapp.git
    path: app-deployment 
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true # Instructs Argo CD to delete resources removed from Git
      selfHeal: true # Overwrites manual/accidental changes in the cluster
