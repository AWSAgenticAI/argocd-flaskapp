apiVersion: apps/v1
kind: Deployment
metadata:
  name: flaskapp-deployment
  labels:
    app: flaskapp
spec:
  replicas: 1 # Runs two copies of your app for high availability
  selector:
    matchLabels:
      app: flaskapp
  template:
    metadata:
      labels:
        app: flaskapp
    spec:
      containers:
      - name: flaskapp
        image: flaskapp:32c11136f7b74a85e27b0829a207d137b66e8e97
        imagePullPolicy: IfNotPresent # Tells k3s to use the locally imported image if available
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: flaskapp-service
spec:
  selector:
    app: flaskapp
  ports:
    - protocol: TCP
      port: 8080        # The port the service listens on inside the cluster
      targetPort: 5000 # The port your Flask container is listening on
